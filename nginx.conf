server {
    listen 3070;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history-mode routing — any unmatched path serves index.html so
    # client-side routes like /dashboard/load-calculator work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed Vite build assets (filenames already include a hash).
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Don't cache index.html so deploys propagate immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Compress text-based assets on the fly.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # Basic security headers — HTTPS / CSP should still come from Coolify's
    # reverse proxy, but these are safe to set at the origin too.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version on errors.
    server_tokens off;

    # 404s for non-SPA paths fall through to the SPA fallback above.
    error_page 404 /index.html;
}
